# pre-commit hooks for Decibench.
#
# Install once:
#   pip install pre-commit
#   pre-commit install --install-hooks
#
# Then every `git commit` runs these gates locally before CI sees the change.

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        files: ^src/
        additional_dependencies:
          - pydantic>=2.10
          - types-pyyaml
        args: [--strict, --no-incremental]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        exclude: ^bridge_sidecar/
      - id: check-toml
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files
        args: [--maxkb=512]
