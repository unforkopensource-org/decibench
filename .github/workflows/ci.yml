name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: pytest (${{ matrix.os }}, py${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,all]"
      - name: Lint
        run: |
          python -m ruff check src tests
          python -m ruff format --check src tests
      - name: Type-check
        run: python -m mypy --strict src
      - name: Test
        run: python -m pytest --cov=decibench --cov-fail-under=78 -x --timeout=60

  docs-truth:
    name: docs-truth invariants
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e ".[dev]"
      - run: python -m pytest tests/test_docs_truth.py -v

  bridge:
    name: bridge sidecar build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: bridge_sidecar/package-lock.json
      - run: cd bridge_sidecar && npm ci
      - run: cd bridge_sidecar && npm run build
      - run: cd bridge_sidecar && npm test --if-present

  security:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install pip-audit
      - run: pip-audit -r <(pip install -e ".[dev,all]" --dry-run 2>/dev/null; pip freeze) || true
