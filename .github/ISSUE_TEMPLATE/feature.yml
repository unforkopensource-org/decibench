name: Feature request
description: Suggest a change to scope or capability.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem you're trying to solve
      description: Describe the user-facing pain. Not the solution yet.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What would you change?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: scope
    attributes:
      label: Scope guess
      options:
        - Fits inside the current architecture
        - Needs a new module
        - Changes the scoring math
        - Changes the bridge protocol
        - Hosted / multi-tenant (likely deferred)
    validations:
      required: true
