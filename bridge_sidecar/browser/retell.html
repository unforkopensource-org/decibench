<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Decibench Retell bridge page</title>
  </head>
  <body>
    <script type="module">
      // Retell bridge page.
      //
      // Loaded by the Decibench bridge sidecar inside a headless Chromium
      // page. The sidecar binds these Node-side callbacks via
      // page.exposeFunction(): decibenchOnAudio, decibenchOnTranscript,
      // decibenchOnEvent, decibenchOnError. The page exposes its own
      // entry points on `window`:
      //   decibenchStart({accessToken, sampleRate}) -> Promise<void>
      //   decibenchPushAudio(b64) -> void
      //   decibenchEndTurn() -> void
      //   decibenchStop() -> void

      import { RetellWebClient } from "https://esm.sh/retell-client-js-sdk@2";

      const TARGET_RATE = 16000;
      let client = null;
      let audioCtx = null;
      let captureNode = null;
      let playbackNode = null;
      let captureStream = null;
      let rawAudioEventSeen = false;
      let agentSpeaking = false;
      // The MediaStreamTrackGenerator path lets us synthesize a microphone
      // input. Where unavailable, we fall back to wiring the playback worklet
      // node into a MediaStreamDestination.
      let microphoneStream = null;

      async function buildSyntheticMicrophone(sampleRate) {
        audioCtx = new AudioContext({ sampleRate: 48000 });
        await audioCtx.audioWorklet.addModule("./audio-shared.js");
        playbackNode = new AudioWorkletNode(audioCtx, "decibench-playback", {
          processorOptions: { targetRate: sampleRate },
        });
        const dest = audioCtx.createMediaStreamDestination();
        playbackNode.connect(dest);
        microphoneStream = dest.stream;
      }

      function attachAgentCapture(remoteStream, sampleRate) {
        const src = audioCtx.createMediaStreamSource(remoteStream);
        captureNode = new AudioWorkletNode(audioCtx, "decibench-capture", {
          processorOptions: { targetRate: sampleRate },
        });
        captureNode.port.onmessage = (e) => {
          if (rawAudioEventSeen) return;
          const msg = e.data;
          if (msg && msg.type === "chunk") {
            const b64 = bytesToBase64(new Uint8Array(msg.pcm16.buffer));
            window.decibenchOnAudio(b64);
          }
        };
        src.connect(captureNode);
        captureStream = remoteStream;
      }

      function bytesToBase64(bytes) {
        let binary = "";
        const chunk = 0x8000;
        for (let i = 0; i < bytes.length; i += chunk) {
          binary += String.fromCharCode.apply(
            null,
            bytes.subarray(i, i + chunk),
          );
        }
        return btoa(binary);
      }

      function downmixInterleaved(float32, channels) {
        if (channels <= 1) return float32;
        const frames = Math.floor(float32.length / channels);
        const mono = new Float32Array(frames);
        for (let frame = 0; frame < frames; frame++) {
          let sum = 0;
          const base = frame * channels;
          for (let ch = 0; ch < channels; ch++) {
            sum += float32[base + ch] || 0;
          }
          mono[frame] = sum / channels;
        }
        return mono;
      }

      function resampleFloat32ToPcm16(float32, fromRate, toRate) {
        if (fromRate === toRate) {
          const pcm16 = new Int16Array(float32.length);
          for (let i = 0; i < float32.length; i++) {
            const sample = Math.max(-1, Math.min(1, float32[i]));
            pcm16[i] = sample < 0
              ? Math.round(sample * 32768)
              : Math.round(sample * 32767);
          }
          return pcm16;
        }

        const ratio = toRate / fromRate;
        const outLen = Math.max(1, Math.floor(float32.length * ratio));
        const pcm16 = new Int16Array(outLen);
        for (let i = 0; i < outLen; i++) {
          const srcIdx = i / ratio;
          const i0 = Math.floor(srcIdx);
          const i1 = Math.min(i0 + 1, float32.length - 1);
          const frac = srcIdx - i0;
          const sample = float32[i0] + (float32[i1] - float32[i0]) * frac;
          const clamped = Math.max(-1, Math.min(1, sample));
          pcm16[i] = clamped < 0
            ? Math.round(clamped * 32768)
            : Math.round(clamped * 32767);
        }
        return pcm16;
      }

      function normalizeRawAudioSamples(audio) {
        if (!audio) return null;

        let samples = null;
        let sourceRate = (audioCtx && audioCtx.sampleRate) || 48000;
        // Retell's raw audio callback currently arrives as browser-playback
        // shaped samples; in live runs this is interleaved stereo even when
        // the negotiated bridge format is 16 kHz mono. Downmix + resample it
        // here so the bridge contract stays truthful.
        let channels = 2;

        if (audio instanceof Float32Array) {
          samples = audio;
        } else if (Array.isArray(audio)) {
          samples = Float32Array.from(audio);
        } else if (typeof audio === "object") {
          if (typeof audio.sampleRate === "number") sourceRate = audio.sampleRate;
          if (typeof audio.sample_rate === "number") sourceRate = audio.sample_rate;
          if (typeof audio.channels === "number") channels = audio.channels;
          if (typeof audio.channelCount === "number") channels = audio.channelCount;
          if (typeof audio.numberOfChannels === "number") {
            channels = audio.numberOfChannels;
          }

          const payload = audio.data ?? audio.samples ?? audio.audio ?? audio.buffer;
          if (payload instanceof Float32Array) {
            samples = payload;
          } else if (Array.isArray(payload)) {
            samples = Float32Array.from(payload);
          } else if (
            ArrayBuffer.isView(payload) &&
            payload.buffer instanceof ArrayBuffer &&
            payload.byteLength % 4 === 0
          ) {
            samples = new Float32Array(
              payload.buffer,
              payload.byteOffset,
              payload.byteLength / 4,
            );
          } else if (payload instanceof ArrayBuffer && payload.byteLength % 4 === 0) {
            samples = new Float32Array(payload);
          }
        } else if (
          ArrayBuffer.isView(audio) &&
          audio.buffer instanceof ArrayBuffer &&
          audio.byteLength % 4 === 0
        ) {
          samples = new Float32Array(audio.buffer, audio.byteOffset, audio.byteLength / 4);
        } else if (audio instanceof ArrayBuffer && audio.byteLength % 4 === 0) {
          samples = new Float32Array(audio);
        }

        if (!samples || samples.length === 0) return null;
        const mono = downmixInterleaved(samples, channels);
        return resampleFloat32ToPcm16(mono, sourceRate, TARGET_RATE);
      }

      function rawAudioToBase64(audio) {
        const pcm16 = normalizeRawAudioSamples(audio);
        if (!pcm16 || pcm16.length === 0) {
          return null;
        }
        return bytesToBase64(new Uint8Array(pcm16.buffer));
      }

      window.decibenchStart = async ({ accessToken, sampleRate }) => {
        const sr = sampleRate || TARGET_RATE;
        await buildSyntheticMicrophone(sr);

        client = new RetellWebClient();

        client.on("call_started", () => {
          window.decibenchOnEvent("metadata", { kind: "call_started" });
        });
        client.on("call_ready", () => {
          window.decibenchOnEvent("metadata", { kind: "call_ready" });
        });
        client.on("call_ended", () => {
          agentSpeaking = false;
          window.decibenchOnEvent("metadata", { kind: "call_ended" });
        });
        client.on("agent_start_talking", () => {
          agentSpeaking = true;
          window.decibenchOnEvent("metadata", { kind: "agent_start_talking" });
        });
        client.on("agent_stop_talking", () => {
          agentSpeaking = false;
          window.decibenchOnEvent("turn_end", { reason: "agent_stop_talking" });
        });
        client.on("audio", (audio) => {
          try {
            if (!agentSpeaking) return;
            const b64 = rawAudioToBase64(audio);
            if (!b64) return;
            rawAudioEventSeen = true;
            window.decibenchOnAudio(b64);
          } catch (err) {
            window.decibenchOnError(
              "vendor_rejected",
              `retell audio event decode failed: ${String(err)}`,
              false,
            );
          }
        });
        client.on("update", (update) => {
          if (update && update.transcript) {
            for (const seg of update.transcript) {
              if (seg.role === "agent") {
                window.decibenchOnTranscript(seg.content || "", true);
              }
            }
          }
        });
        client.on("error", (err) => {
          window.decibenchOnError("vendor_rejected", String(err && err.message ? err.message : err), false);
        });
        client.on("metadata", (meta) => {
          window.decibenchOnEvent("metadata", meta || {});
        });

        // Tell Retell to use our synthetic microphone stream rather than
        // probing real getUserMedia. The SDK respects `customStream`.
        await client.startCall({
          accessToken,
          sampleRate: sr,
          captureDeviceId: undefined,
          playbackDeviceId: undefined,
          emitRawAudioSamples: true,
          customStream: microphoneStream,
        });

        // Hook the SDK's audio playback element so we can re-capture agent
        // audio. The SDK's native `audio` event is the primary path above;
        // hidden <audio> capture remains as a fallback for SDK/browser combos
        // where raw samples are not emitted.
        const findRemote = () => {
          const audios = document.getElementsByTagName("audio");
          for (const a of audios) {
            if (a.srcObject) {
              attachAgentCapture(a.srcObject, sr);
              return true;
            }
          }
          return false;
        };
        // Retry briefly since the audio element appears asynchronously.
        const start = performance.now();
        while (performance.now() - start < 5000) {
          if (findRemote()) break;
          await new Promise((r) => setTimeout(r, 50));
        }
      };

      window.decibenchPushAudio = (b64) => {
        if (!playbackNode) return;
        const bin = atob(b64);
        const bytes = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
        const pcm16 = new Int16Array(bytes.buffer, bytes.byteOffset, bytes.length / 2);
        playbackNode.port.postMessage({ type: "push", pcm16 });
      };

      window.decibenchEndTurn = () => {
        if (playbackNode) {
          playbackNode.port.postMessage({ type: "flush" });
        }
      };

      window.decibenchStop = () => {
        try {
          client && client.stopCall();
        } catch (_) {}
        try {
          captureNode && captureNode.disconnect();
        } catch (_) {}
        try {
          playbackNode && playbackNode.disconnect();
        } catch (_) {}
        try {
          audioCtx && audioCtx.close();
        } catch (_) {}
      };
    </script>
  </body>
</html>
